name: DevSecOps CI

on:
  pull_request:
    branches: [ "main", "dev", "sit", "uat", "staging", "demo", "prod" ]
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'
        check-latest: true

    - name: Go Format
      run: go fmt ./...

    - name: Unit Tests
      run: go test -v -race ./...

  sast-dast-trivy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'table'
        exit-code: '1'
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'CRITICAL,HIGH'

    - name: Run Gosec Security Scanner (SAST)
      uses: securego/gosec@master
      with:
        args: ./...
